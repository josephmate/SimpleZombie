<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Zombie</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #joystick-zone {
        position: fixed;
        bottom: 40px;
        left: 40px;
        width: 120px;
        height: 120px;
        z-index: 100;
        display: none; /* hidden by default (desktop) */
      }
      #fire-zone {
        position: fixed;
        bottom: 40px;
        right: 40px;
        width: 120px;
        height: 120px;
        z-index: 100;
        display: none;
      }
      @media (pointer: coarse) {
        /* show only on touch/mobile devices */
        #joystick-zone {
          display: block;
        }
        #fire-zone {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="joystick-zone"></div>
    <div id="fire-zone"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
