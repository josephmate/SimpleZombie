<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Zombie</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #joystick-zone {
        position: fixed;
        bottom: 40px;
        left: 40px;
        width: 120px;
        height: 120px;
        z-index: 100;
        display: none; /* hidden by default (desktop) */
      }
      #fire-zone {
        position: fixed;
        bottom: 40px;
        right: 40px;
        width: 120px;
        height: 120px;
        z-index: 100;
        display: none;
      }
      @media (pointer: coarse) {
        /* show only on touch/mobile devices */
        #joystick-zone {
          display: block;
        }
        #fire-zone {
          display: block;
        }
        #weapon-cycle {
          display: flex;
        }
      }
      #weapon-cycle {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 14px;
        z-index: 100;
      }
      #weapon-cycle button {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.5);
        color: #fff;
        font-size: 1.3rem;
        touch-action: none;
        cursor: pointer;
      }
      /* ── Level select overlay ─────────────────────────────────────────── */
      #level-select {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.93);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 200;
        font-family: monospace;
      }
      #level-select h1 {
        font-size: 2rem;
        color: #90ee90;
        margin-bottom: 0.4rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      #level-select .subtitle {
        color: #aaa;
        font-size: 0.8rem;
        margin-bottom: 2rem;
      }
      #level-select .levels {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        max-width: 580px;
        width: 92%;
      }
      #level-select button {
        background: #111;
        border: 2px solid #90ee90;
        color: #90ee90;
        padding: 14px 6px;
        cursor: pointer;
        font-family: monospace;
        border-radius: 4px;
        transition: background 0.12s, color 0.12s;
      }
      #level-select button:hover {
        background: #90ee90;
        color: #000;
      }
      #level-select button .lvl-num {
        display: block;
        font-size: 1.1rem;
        font-weight: bold;
        margin-bottom: 5px;
      }
      #level-select button .lvl-info {
        display: block;
        font-size: 0.62rem;
        opacity: 0.75;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <!-- Level select overlay (placeholder for proper levels) -->
    <div id="level-select">
      <h1>Select Level</h1>
      <p class="subtitle">Placeholder — levels 1–10</p>
      <div class="levels" id="levels-grid"></div>
    </div>

    <div id="joystick-zone"></div>
    <div id="weapon-cycle">
      <button id="weapon-prev">&#9664;</button>
      <button id="weapon-next">&#9654;</button>
    </div>
    <div id="fire-zone"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
